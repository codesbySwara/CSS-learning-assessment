<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="grid-container">
        <div class="Header">
            <span class="logo">My Site</span>
            <nav class="header-links">
                <a href="#"><span>🏠</span> Home</a>
                <a href="#"><span>📊</span> Analytics</a>
                <a href="#"><span>⚙️</span> Settings</a>
            </nav>
        </div>
        <div class="Sidebar">
            <a href="#"><span>📋</span> Dashboard</a>
            <a href="#"><span>👤</span> Users</a>
            <a href="#"><span>💰</span> Revenue</a>
        </div>
        <div class="Content">
            <div class="cards-container">

        <div class="card">
            <span class="card-label">Total Users</span>
            <span class="card-value">12,430</span>
            <svg class="sparkline" viewBox="0 0 60 30">
            <polyline
                points="0,25 10,20 20,22 30,10 40,15 50,5 60,8"
                fill="none"
                stroke="green"
                stroke-width="2"
            />
            </svg>
            <div class="card-footer">
                <span>↑</span> 8% this week
            </div>
        </div>

        <div class="card">
            <span class="card-label">Revenue</span>
            <span class="card-value">₹84,200</span>
            <svg class="sparkline" viewBox="0 0 60 30">
            <polyline
                points="0,20 10,17 20,21 30,15 40,18 50,22 60,11"
                fill="none"
                stroke="green"
                stroke-width="2"
            />
            </svg>
            <div class="card-footer">
                <span>↑</span> 5% this week
            </div>
        </div>

        <div class="card">
            <span class="card-label">Active Sessions</span>
            <span class="card-value">3,210</span>
            <svg class="sparkline" viewBox="0 0 60 30">
            <polyline
                points="0,8 10,12 20,9 30,14 40,11 50,18 60,22"
                fill="none"
                stroke="green"
                stroke-width="2"
            />
            </svg>
            <div class="card-footer">
                <span>↓</span> 2% this week
            </div>
        </div>

        <div class="card">
            <span class="card-label">Bounce Rate</span>
            <span class="card-value">41%</span>
            <svg class="sparkline" viewBox="0 0 60 30">
            <polyline
                points="0,10 10,7 20,13 30,9 40,15 50,12 60,22"
                fill="none"
                stroke="green"
                stroke-width="2"
            />
            </svg>
            <div class="card-footer">
                <span>↓</span> 1% this week
            </div>
        </div>

    </div>
        </div>
    </div>
</body>
</html>
